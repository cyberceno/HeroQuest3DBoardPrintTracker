<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeroQuest Dungeon 3D-Druck Chronik</title>
<style>
  @import url('https://fonts.cdnfonts.com/css/cinzel-decorative');
  @import url('https://fonts.cdnfonts.com/css/im-fell-english');
  @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Pirata+One&display=swap');

  :root{
    --abyss: #100d09;
    --stone: #1c1710;
    --stone-2: #262017;
    --stone-3: #322a1e;
    --parchment: #ecdcb4;
    --parchment-dim: #a89372;
    --ember: #c85a2b;
    --ember-glow: #e8823f;
    --gold: #d0a850;
    --gold-dim: #8a6f38;
    --moss: #6d8a5e;
    --moss-bright: #8fb27c;
    --line: rgba(208,168,80,0.22);
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{ margin:0; padding:0; }

  body{
    background:
      radial-gradient(ellipse 120% 50% at 50% 0%, rgba(232,130,63,0.10) 0%, transparent 55%),
      radial-gradient(ellipse 100% 40% at 50% 100%, rgba(208,168,80,0.05) 0%, transparent 60%),
      var(--abyss);
    color: var(--parchment);
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ---------- Header: torch-lit gate ---------- */
  header{
    position: relative;
    text-align: center;
    padding: 34px 18px 26px;
    overflow: hidden;
  }
  header::before{
    content:"";
    position:absolute; inset:0;
    background:
      repeating-linear-gradient(90deg,
        transparent 0 54px, rgba(0,0,0,0.35) 54px 56px),
      repeating-linear-gradient(0deg,
        transparent 0 30px, rgba(0,0,0,0.35) 30px 32px),
      linear-gradient(180deg, var(--stone-2), var(--stone));
    opacity: 0.9;
    z-index: 0;
  }
  header::after{
    content:"";
    position:absolute; left:0; right:0; bottom:0; height:2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    z-index: 1;
  }
  .torches{
    position:absolute; top:20px; left:0; right:0;
    display:flex; justify-content:space-between;
    padding: 0 16px;
    z-index: 1;
    pointer-events:none;
  }
  .torch{
    font-size: 1.3rem;
    filter: drop-shadow(0 0 8px rgba(232,130,63,0.8));
    animation: flicker 2.8s infinite ease-in-out;
  }
  .torch:last-child{ animation-delay: -1.4s; }
  @keyframes flicker{
    0%,100%{ opacity:1; transform: scale(1); }
    45%{ opacity:0.75; transform: scale(0.96); }
    60%{ opacity:0.95; transform: scale(1.02); }
  }
  @media (prefers-reduced-motion: reduce){
    .torch{ animation: none; }
  }

  h1{
    position: relative; z-index: 1;
    font-family: 'Cinzel Decorative', Georgia, serif;
    font-size: 1.7rem;
    line-height: 1.25;
    letter-spacing: 0.02em;
    margin: 4px 0 6px;
    font-weight: 700;
    color: #ffcf3f;
    text-shadow:
      0 -1px 0 #fff1b0,
      -2px -2px 0 #8a2418,
       2px -2px 0 #8a2418,
      -2px  2px 0 #8a2418,
       2px  2px 0 #8a2418,
      -2px  0   0 #8a2418,
       2px  0   0 #8a2418,
       0   -2px 0 #8a2418,
       0    2px 0 #8a2418,
       0 4px 0 #3a0f0a,
       0 6px 2px #24120a,
       0 8px 16px rgba(0,0,0,0.85),
       0 0 22px rgba(255,180,60,0.4);
  }
  header p{
    position: relative; z-index: 1;
    margin: 0;
    color: var(--parchment-dim);
    font-family: 'IM Fell English', Georgia, serif;
    font-style: italic;
    font-size: 0.9rem;
  }

  /* ---------- Header inner: title flanked by dice stacks ---------- */
  .header-inner{
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .dice-stack{
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }
  .die{
    width: 40px;
    height: 40px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(155deg, #f4ecd6 0%, #e4d8b8 55%, #cdbf98 100%);
    box-shadow:
      inset 0 2px 3px rgba(255,255,255,0.7),
      inset 0 -3px 4px rgba(120,100,60,0.35),
      0 3px 6px rgba(0,0,0,0.55);
    border: 1px solid rgba(90,70,40,0.35);
    transform: rotate(-3deg);
  }
  .dice-stack .die:nth-child(2){ transform: rotate(2deg); }
  .dice-stack .die:nth-child(3){ transform: rotate(-1.5deg); }
  .die svg{ width: 74%; height: 74%; display: block; }
  .die.skull{ color: #241f18; }
  .die.shield-white{ color: #2a2520; }
  .die.shield-black{ color: #241f18; }

  @media (max-width: 480px){
    .header-inner{ gap: 10px; }
    .die{ width: 32px; height: 32px; border-radius: 7px; }
    h1{ font-size: 1.35rem !important; }
  }
  @media (max-width: 360px){
    .dice-stack.right{ display: none; }
  }

  /* ---------- Overall quest progress ---------- */
  .quest{
    max-width: 620px;
    margin: 20px auto 0;
    padding: 0 18px;
  }
  .quest-frame{
    border: 1px solid var(--line);
    border-radius: 6px;
    background: linear-gradient(180deg, var(--stone-2), var(--stone));
    padding: 14px 16px 12px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 6px 16px rgba(0,0,0,0.45);
  }
  .quest-head{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom: 8px;
  }
  .quest-label{
    font-family: 'IM Fell English', Georgia, serif;
    font-style: italic;
    color: var(--parchment-dim);
    font-size: 0.85rem;
  }
  .quest-pct{
    font-family: 'Cinzel Decorative', Georgia, serif;
    color: var(--gold);
    font-size: 1.15rem;
  }
  .quest-track{
    position: relative;
    height: 14px;
    border-radius: 8px;
    background: var(--abyss);
    border: 1px solid rgba(0,0,0,0.6);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.7);
    overflow: hidden;
  }
  .quest-fill{
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #7a3a1c, var(--ember), var(--ember-glow));
    box-shadow: 0 0 12px rgba(232,130,63,0.5);
    transition: width 0.5s ease;
    border-radius: 8px;
  }
  .quest-count{
    text-align: right;
    font-size: 0.75rem;
    color: var(--parchment-dim);
    margin-top: 6px;
    letter-spacing: 0.04em;
  }

  /* ---------- Save state chip ---------- */
  .save-chip{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    letter-spacing: 0.03em;
    color: var(--parchment-dim);
    margin-top: 8px;
  }
  .save-dot{
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gold-dim);
  }
  .save-chip.ok .save-dot{ background: var(--moss-bright); box-shadow: 0 0 6px rgba(143,178,124,0.7); }
  .save-chip.ok{ color: var(--moss-bright); }
  .save-chip.fail .save-dot{ background: var(--ember-glow); box-shadow: 0 0 6px rgba(232,130,63,0.7); }
  .save-chip.fail{ color: var(--ember-glow); }

  .phase-block{
    margin-bottom: 38px;
  }
  .phase-block.upcoming{
    opacity: 0.55;
  }
  .phase-block.phase-done .phase-header{
    border-color: rgba(109,138,94,0.55);
  }

  .phase-header{
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px 16px 12px;
    margin-bottom: 16px;
    background: linear-gradient(180deg, var(--stone-2), var(--stone));
    box-shadow: 0 3px 10px rgba(0,0,0,0.3);
  }
  .phase-header-top{
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 10px;
  }
  .phase-titles{ display: flex; flex-direction: column; gap: 2px; }
  .phase-title{
    font-family: 'Cinzel Decorative', Georgia, serif;
    font-size: 1.05rem;
    color: var(--gold);
    letter-spacing: 0.06em;
  }
  .phase-subtitle{
    font-family: 'IM Fell English', Georgia, serif;
    font-style: italic;
    font-size: 0.82rem;
    color: var(--parchment-dim);
  }
  .phase-badge{
    flex-shrink: 0;
    font-size: 0.7rem;
    letter-spacing: 0.04em;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--line);
    white-space: nowrap;
  }
  .phase-badge.active{
    color: var(--ember-glow);
    border-color: rgba(200,90,43,0.6);
    background: rgba(200,90,43,0.1);
  }
  .phase-badge.done{
    color: var(--moss-bright);
    border-color: rgba(109,138,94,0.6);
    background: rgba(109,138,94,0.1);
  }
  .phase-badge.upcoming{
    color: var(--parchment-dim);
  }
  .phase-bar-track{
    height: 8px;
    border-radius: 5px;
    background: var(--abyss);
    border: 1px solid rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .phase-bar-fill{
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--ember), var(--ember-glow));
    transition: width 0.4s ease;
  }
  .phase-block.phase-done .phase-bar-fill{
    background: linear-gradient(90deg, var(--moss), var(--moss-bright));
  }
  .phase-count{
    text-align: right;
    font-size: 0.72rem;
    color: var(--parchment-dim);
    margin-top: 5px;
  }

  /* ---------- Sections ---------- */
  main{
    max-width: 620px;
    margin: 26px auto 0;
    padding: 0 14px;
  }
  .section{
    margin-bottom: 30px;
  }
  .section-head{
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    margin: 0 4px 12px;
  }
  .section-title{
    font-family: 'Cinzel Decorative', Georgia, serif;
    font-size: 1.0rem;
    color: var(--ember-glow);
    letter-spacing: 0.09em;
    text-transform: uppercase;
  }
  .section-sum{
    font-size: 0.78rem;
    color: var(--parchment-dim);
    white-space: nowrap;
  }
  .section-sum.done{ color: var(--moss-bright); }

  /* ---------- Item cards ---------- */
  .item{
    position: relative;
    background: linear-gradient(180deg, var(--stone-2), var(--stone));
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 13px 14px 13px 18px;
    margin-bottom: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.35);
    transition: border-color 0.3s ease;
  }
  .item::before{
    content:"";
    position:absolute; left:0; top:0; bottom:0; width:4px;
    border-radius: 6px 0 0 6px;
    background: var(--gold-dim);
    opacity: 0.5;
    transition: background 0.3s ease, opacity 0.3s ease;
  }
  .item.done{ border-color: rgba(109,138,94,0.55); }
  .item.done::before{ background: var(--moss-bright); opacity: 1; }

  .item-row{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .item-info{ flex: 1; min-width: 0; }
  .item-name{
    font-size: 0.97rem;
    color: var(--parchment);
    line-height: 1.3;
  }
  .item.done .item-name{ color: var(--moss-bright); }
  .item-count{
    font-size: 0.78rem;
    color: var(--parchment-dim);
    margin-top: 3px;
  }
  .item-count b{ color: var(--parchment); font-weight: normal; }
  .item.done .item-count b{ color: var(--moss-bright); }
  .item-count .done-mark{ color: var(--moss-bright); margin-left: 5px; }

  .item-bar{
    height: 4px;
    border-radius: 3px;
    background: rgba(0,0,0,0.5);
    margin-top: 9px;
    overflow: hidden;
  }
  .item-bar-fill{
    height: 100%;
    width: 0%;
    background: var(--gold-dim);
    transition: width 0.3s ease, background 0.3s ease;
    border-radius: 3px;
  }
  .item.done .item-bar-fill{ background: var(--moss-bright); }

  .item.tbd-target .item-count{
    color: var(--parchment-dim);
  }
  .item.tbd-target .item-count b{
    color: var(--parchment);
  }

  /* ---------- Stepper ---------- */
  .stepper{
    display: flex;
    align-items: stretch;
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    background: rgba(0,0,0,0.35);
    flex-shrink: 0;
  }
  .stepper button{
    width: 44px;
    height: 44px;
    border: none;
    background: transparent;
    color: var(--gold);
    font-size: 1.35rem;
    font-family: Georgia, serif;
    cursor: pointer;
    line-height: 1;
  }
  .stepper button:active{ background: rgba(208,168,80,0.22); }
  .stepper input{
    width: 44px;
    border: none;
    border-left: 1px solid var(--line);
    border-right: 1px solid var(--line);
    background: transparent;
    color: var(--parchment);
    text-align: center;
    font-size: 1.02rem;
    font-family: Georgia, serif;
  }
  .stepper input:focus{ outline: none; background: rgba(208,168,80,0.12); }
  /* hide number spinners */
  .stepper input::-webkit-outer-spin-button,
  .stepper input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  .stepper input[type=number]{ -moz-appearance: textfield; }

  .item-note{
    font-family: 'IM Fell English', Georgia, serif;
    font-style: italic;
    font-size: 0.78rem;
    color: var(--parchment-dim);
    margin-top: 8px;
  }

  .item-img{
    width: 56px;
    height: 56px;
    border-radius: 5px;
    object-fit: cover;
    border: 1px solid var(--line);
    flex-shrink: 0;
    background: var(--abyss);
  }
  .item-img-placeholder{
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    color: var(--parchment-dim);
    opacity: 0.5;
  }

  .stepper button:disabled,
  .stepper input:disabled{
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* ---------- Footer actions ---------- */
  .actions{
    max-width: 620px;
    margin: 6px auto 0;
    padding: 0 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }
  .btn{
    font-family: Georgia, serif;
    font-size: 0.82rem;
    letter-spacing: 0.05em;
    padding: 11px 18px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: linear-gradient(180deg, var(--stone-3), var(--stone-2));
    color: var(--parchment);
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .btn:active{ transform: translateY(1px); }
  .btn.moss{ border-color: rgba(109,138,94,0.6); color: var(--moss-bright); }
  .btn.ember{ border-color: rgba(200,90,43,0.6); color: var(--ember-glow); }

  .status-note{
    text-align: center;
    font-family: 'IM Fell English', Georgia, serif;
    font-style: italic;
    font-size: 0.8rem;
    color: var(--parchment-dim);
    margin-top: 14px;
    padding: 0 20px;
    min-height: 18px;
  }
</style>
</head>
<body>

<header>
  <div class="torches"><span class="torch">🔥</span><span class="torch">🔥</span></div>
  <div class="header-inner">
    <div class="dice-stack" aria-hidden="true">
      <span class="die skull">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 15c-17 0-29 12-29 29 0 9 4 16 10 20v9c0 3 2 6 6 6h2v-7h4v7h4v-7h4v7h4v-7h4v7h4v-7h4v7h2c4 0 6-3 6-6v-9c6-4 10-11 10-20 0-17-12-29-29-29z" fill="currentColor"/>
          <ellipse cx="38" cy="45" rx="8" ry="9" fill="#f0e8d0"/>
          <ellipse cx="62" cy="45" rx="8" ry="9" fill="#f0e8d0"/>
          <path d="M50 52l-4 9h8z" fill="#f0e8d0"/>
        </svg>
      </span>
      <span class="die shield-white">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 15L22 26v25c0 18 12 28 28 34 16-6 28-16 28-34V26z" fill="none" stroke="currentColor" stroke-width="7" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="die skull">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 15c-17 0-29 12-29 29 0 9 4 16 10 20v9c0 3 2 6 6 6h2v-7h4v7h4v-7h4v7h4v-7h4v7h4v-7h4v7h2c4 0 6-3 6-6v-9c6-4 10-11 10-20 0-17-12-29-29-29z" fill="currentColor"/>
          <ellipse cx="38" cy="45" rx="8" ry="9" fill="#f0e8d0"/>
          <ellipse cx="62" cy="45" rx="8" ry="9" fill="#f0e8d0"/>
          <path d="M50 52l-4 9h8z" fill="#f0e8d0"/>
        </svg>
      </span>
    </div>

    <h1>HeroQuest Dungeon<br>3D-Druck Chronik</h1>

    <div class="dice-stack" aria-hidden="true">
      <span class="die shield-black">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 15L22 26v25c0 18 12 28 28 34 16-6 28-16 28-34V26z" fill="currentColor"/>
        </svg>
      </span>
      <span class="die skull">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 15c-17 0-29 12-29 29 0 9 4 16 10 20v9c0 3 2 6 6 6h2v-7h4v7h4v-7h4v7h4v-7h4v7h4v-7h4v7h2c4 0 6-3 6-6v-9c6-4 10-11 10-20 0-17-12-29-29-29z" fill="currentColor"/>
          <ellipse cx="38" cy="45" rx="8" ry="9" fill="#f0e8d0"/>
          <ellipse cx="62" cy="45" rx="8" ry="9" fill="#f0e8d0"/>
          <path d="M50 52l-4 9h8z" fill="#f0e8d0"/>
        </svg>
      </span>
      <span class="die shield-white">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 15L22 26v25c0 18 12 28 28 34 16-6 28-16 28-34V26z" fill="none" stroke="currentColor" stroke-width="7" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>
  </div>
</header>

<div class="quest">
  <div class="quest-frame">
    <div class="quest-head">
      <span class="quest-label">Die Quest schreitet voran…</span>
      <span class="quest-pct" id="overallPct">0%</span>
    </div>
    <div class="quest-track"><div class="quest-fill" id="overallFill"></div></div>
    <div class="quest-count" id="overallCount">0 / 0 Teile gedruckt</div>
    <div class="save-chip" id="saveChip"><span class="save-dot"></span><span id="saveChipText">Speicher wird geprüft…</span></div>
  </div>
</div>

<main id="main"></main>

<div class="actions">
  <button class="btn" id="lockBtn">🔒 Zum Bearbeiten entsperren</button>
  <button class="btn moss" id="saveBtn">Fortschritt sichern</button>
  <button class="btn" id="loadBtn">Fortschritt laden</button>
  <button class="btn ember" id="resetBtn">Zurücksetzen</button>
</div>
<div class="status-note" id="statusNote"></div>

<script>
// image: null means "no picture yet" — send MakerWorld image URLs to fill these in.
const PHASE_INFO = {
  1: { title: "Phase 1", subtitle: "Korridore — das Grundgerüst" },
  2: { title: "Phase 2", subtitle: "Räume — die Kammern" },
  3: { title: "Phase 3", subtitle: "Wände, Türen & Blöcke — der Feinschliff" },
};

const DATA = [
  {
    section: "Korridore",

function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }

/* ---------- Save-state chip ---------- */
function setChip(state, text){
  const chip = document.getElementById("saveChip");
  chip.className = "save-chip" + (state ? " " + state : "");
  document.getElementById("saveChipText").textContent = text;
}

/* ---------- Password gate ---------- */
async function sha256Hex(text){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function updateLockUI(){
  const lockBtn = document.getElementById("lockBtn");
  lockBtn.textContent = editUnlocked ? "🔓 Bearbeiten aktiv" : "🔒 Zum Bearbeiten entsperren";
  lockBtn.className = "btn" + (editUnlocked ? " moss" : "");
}

async function tryUnlock(){
  const pw = window.prompt("Passwort zum Bearbeiten eingeben:");
  if(!pw) return;
  const hash = await sha256Hex(pw);
  if(hash === EDIT_HASH){
    editUnlocked = true;
    sessionStorage.setItem("hq-edit-unlocked", "1");
    updateLockUI();
    render();
    showStatus("Bearbeiten freigeschaltet.");
  }else{
    showStatus("Falsches Passwort.");
  }
}

/* ---------- Supabase-backed shared storage ---------- */
async function loadCounts(){
  // Local cache first, for instant paint while the network call is in flight.
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) counts = JSON.parse(raw);
  }catch(e){ counts = {}; }

  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=item_id,count`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    if(!res.ok) throw new Error("fetch failed: " + res.status);
    const rows = await res.json();
    const fresh = {};
    rows.forEach(r => { fresh[r.item_id] = r.count; });
    counts = fresh;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(counts));
    storageWorks = true;
    setChip("ok", "Gemeinsamer Stand geladen");
  }catch(e){
    storageWorks = false;
    setChip("fail", "Konnte gemeinsamen Stand nicht laden — zeige letzten bekannten Stand");
  }
}

function scheduleSave(itemId){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => doSave(itemId), 350);
}

async function doSave(itemId){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(counts)); }catch(e){}

  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?on_conflict=item_id`, {
      method: "POST",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        Prefer: "resolution=merge-duplicates,return=minimal"
      },
      body: JSON.stringify([{ item_id: itemId, count: counts[itemId] ?? 0, updated_at: new Date().toISOString() }])
    });
    if(res.ok){
      setChip("ok", "Für alle sichtbar gespeichert");
    }else{
      setChip("fail", "Speichern fehlgeschlagen — Stand nur lokal");
    }
  }catch(e){
    setChip("fail", "Kein Netzwerk — Stand nur lokal, wird beim nächsten Mal nachgeholt");
  }
}

/* Poll for updates from Andreas so read-only viewers see fresh numbers
   without needing to reload the page. */
function startPolling(){
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if(document.visibilityState !== "visible") return;
    if(editUnlocked) return; // avoid clobbering an in-progress edit
    await loadCounts();
    render();
  }, 15000);
}

/* Flush any pending local cache write when the page is hidden/closed.
   (The Supabase write already went out per-change via scheduleSave.) */
document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "hidden"){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(counts)); }catch(e){}
  }
});

/* ---------- Manual backup: compact code via clipboard ---------- */
function encodeProgress(){
  const entries = Object.keys(counts)
    .filter(k => counts[k] > 0)
    .map(k => `${k}:${counts[k]}`);
  return "HQ1|" + entries.join("|");
}

function decodeProgress(text){
  const trimmed = text.trim();
  if(!trimmed.startsWith("HQ1")) throw new Error("invalid");
  const parts = trimmed.split("|").slice(1).filter(Boolean);
  const parsed = {};
  parts.forEach(p => {
    const idx = p.lastIndexOf(":");
    if(idx === -1) return;
    const val = parseInt(p.slice(idx + 1), 10);
    if(!isNaN(val)) parsed[p.slice(0, idx)] = val;
  });
  return parsed;
}

async function copyProgress(){
  const code = encodeProgress();
  try{
    await navigator.clipboard.writeText(code);
    showStatus("Fortschritt kopiert — füge ihn z. B. in deine Notizen ein.");
  }catch(e){
    window.prompt("Kopieren nicht möglich — Text manuell markieren:", code);
  }
}

async function pasteProgress(){
  let text = "";
  try{ text = await navigator.clipboard.readText(); }
  catch(e){ text = window.prompt("Gespeicherten Fortschritts-Code einfügen:") || ""; }
  if(!text) return;
  try{
    counts = decodeProgress(text);
    scheduleSave();
    render();
    showStatus("Fortschritt geladen.");
  }catch(e){
    showStatus("Code nicht lesbar — bitte prüfen und erneut versuchen.");
  }
}

function showStatus(msg){
  const el = document.getElementById("statusNote");
  el.textContent = msg;
  setTimeout(() => { if(el.textContent === msg) el.textContent = ""; }, 3500);
}

/* ---------- Rendering ---------- */
function isNumericTarget(t){ return typeof t === "number"; }

function render(){
  const main = document.getElementById("main");
  main.innerHTML = "";

  let grandCurrent = 0, grandTarget = 0;

  // Group sections by phase, preserving DATA order within each phase.
  const phaseNumbers = [...new Set(DATA.map(s => s.phase))].sort((a,b) => a-b);

  // First pass: compute totals per phase so we can decide status badges.
  // Items with target "tbd" are tracked separately and excluded from the
  // percentage math, since there's nothing to divide by yet.
  const phaseTotals = {};
  phaseNumbers.forEach(p => { phaseTotals[p] = { current: 0, target: 0, tbdCount: 0 }; });
  DATA.forEach(section => {
    section.items.forEach(it => {
      const current = clamp(counts[it.id] ?? 0, 0, 9999);
      if(isNumericTarget(it.target)){
        phaseTotals[section.phase].current += Math.min(current, it.target);
        phaseTotals[section.phase].target += it.target;
      }else{
        phaseTotals[section.phase].tbdCount += 1;
      }
    });
  });

  // Determine which phase is "active": the first phase not yet fully complete
  // (a phase with only tbd items and no numeric target never counts as "done").
  let activePhase = phaseNumbers.find(p => {
    const t = phaseTotals[p];
    return t.current < t.target || (t.target === 0 && t.tbdCount > 0);
  });
  if(activePhase === undefined) activePhase = phaseNumbers[phaseNumbers.length - 1];

  phaseNumbers.forEach(phaseNum => {
    const info = PHASE_INFO[phaseNum] || { title: `Phase ${phaseNum}`, subtitle: "" };
    const totals = phaseTotals[phaseNum];
    const isDonePhase = totals.target > 0 && totals.current >= totals.target && totals.tbdCount === 0;
    const isActivePhase = phaseNum === activePhase && !isDonePhase;
    const isUpcoming = !isDonePhase && !isActivePhase;

    const phaseBlock = document.createElement("div");
    phaseBlock.className = "phase-block" + (isUpcoming ? " upcoming" : "") + (isDonePhase ? " phase-done" : "");

    const badgeText = isDonePhase ? "✓ Abgeschlossen" : (isActivePhase ? "▶ Aktuell" : "Später");
    const badgeClass = isDonePhase ? "done" : (isActivePhase ? "active" : "upcoming");
    const phasePct = totals.target > 0 ? clamp((totals.current/totals.target)*100, 0, 100) : 0;
    const phaseCountText = totals.target > 0
      ? `${totals.current} / ${totals.target}${totals.tbdCount > 0 ? ` (+${totals.tbdCount} Menge tbd)` : ""}`
      : (totals.tbdCount > 0 ? "Menge: tbd" : "0 / 0");

    const header = document.createElement("div");
    header.className = "phase-header";
    header.innerHTML = `
      <div class="phase-header-top">
        <div class="phase-titles">
          <span class="phase-title">${info.title}</span>
          <span class="phase-subtitle">${info.subtitle}</span>
        </div>
        <span class="phase-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="phase-bar-track"><div class="phase-bar-fill" style="width:${phasePct}%"></div></div>
      <div class="phase-count">${phaseCountText}</div>
    `;
    phaseBlock.appendChild(header);

    DATA.filter(s => s.phase === phaseNum).forEach(section => {
      let secCurrent = 0, secTarget = 0, secTbdCount = 0;
      section.items.forEach(it => {
        const c = clamp(counts[it.id] ?? 0, 0, 9999);
        if(isNumericTarget(it.target)){
          secCurrent += Math.min(c, it.target);
          secTarget += it.target;
        }else{
          secTbdCount += 1;
        }
      });

      const sec = document.createElement("div");
      sec.className = "section";

      const head = document.createElement("div");
      head.className = "section-head";
      const secDone = secTarget > 0 && secCurrent >= secTarget && secTbdCount === 0;
      const secSumText = secTarget > 0
        ? (secDone ? "✓ vollständig" : `${secCurrent} / ${secTarget}${secTbdCount > 0 ? ` (+${secTbdCount} tbd)` : ""}`)
        : (secTbdCount > 0 ? "Menge: tbd" : "0 / 0");
      head.innerHTML = `
        <span class="section-title">${section.section}</span>
        <span class="section-sum${secDone ? " done" : ""}">${secSumText}</span>
      `;
      sec.appendChild(head);

      section.items.forEach(item => {
        const current = clamp(counts[item.id] ?? 0, 0, 9999);
        const numeric = isNumericTarget(item.target);

        if(numeric){
          grandCurrent += Math.min(current, item.target);
          grandTarget += item.target;
        }

        const pct = numeric ? clamp((current / item.target) * 100, 0, 100) : 0;
        const isDone = numeric && current >= item.target;
        const targetLabel = numeric ? item.target : "tbd";

        const el = document.createElement("div");
        el.className = "item" + (isDone ? " done" : "") + (numeric ? "" : " tbd-target");
        const imgHtml = item.image
          ? `<img class="item-img" src="${item.image}" alt="${item.name}" loading="lazy">`
          : `<div class="item-img item-img-placeholder">🧩</div>`;
        el.innerHTML = `
          <div class="item-row">
            ${imgHtml}
            <div class="item-info">
              <div class="item-name">${item.name}</div>
              <div class="item-count"><b>${current}</b> von ${targetLabel}${isDone ? '<span class="done-mark">✓</span>' : ""}</div>
            </div>
            <div class="stepper">
              <button data-action="dec" data-id="${item.id}" aria-label="Eins weniger" ${editUnlocked ? "" : "disabled"}>−</button>
              <input type="number" min="0" value="${current}" data-id="${item.id}" inputmode="numeric" aria-label="Anzahl ${item.name}" ${editUnlocked ? "" : "disabled"}>
              <button data-action="inc" data-id="${item.id}" aria-label="Eins mehr" ${editUnlocked ? "" : "disabled"}>+</button>
            </div>
          </div>
          ${numeric ? `<div class="item-bar"><div class="item-bar-fill" style="width:${pct}%"></div></div>` : ""}
          ${item.note ? `<div class="item-note">${item.note}</div>` : ""}
        `;
        sec.appendChild(el);
      });

      phaseBlock.appendChild(sec);
    });

    main.appendChild(phaseBlock);
  });

  const overallPct = grandTarget > 0 ? clamp((grandCurrent / grandTarget) * 100, 0, 100) : 0;
  document.getElementById("overallFill").style.width = overallPct + "%";
  document.getElementById("overallCount").textContent = `${grandCurrent} / ${grandTarget} Teile gedruckt`;
  document.getElementById("overallPct").textContent = Math.round(overallPct) + "%";

  attachHandlers();
}

function attachHandlers(){
  document.querySelectorAll(".stepper button").forEach(btn => {
    btn.addEventListener("click", () => {
      if(!editUnlocked) return;
      const id = btn.getAttribute("data-id");
      const cur = clamp(counts[id] ?? 0, 0, 9999);
      counts[id] = btn.getAttribute("data-action") === "inc" ? cur + 1 : clamp(cur - 1, 0, 9999);
      scheduleSave(id);
      render();
    });
  });
  document.querySelectorAll(".stepper input").forEach(input => {
    input.addEventListener("change", () => {
      if(!editUnlocked) return;
      const id = input.getAttribute("data-id");
      let val = parseInt(input.value, 10);
      if(isNaN(val) || val < 0) val = 0;
      counts[id] = val;
      scheduleSave(id);
      render();
    });
  });
}

document.getElementById("resetBtn").addEventListener("click", () => {
  if(!editUnlocked){ showStatus("Erst entsperren, um zurückzusetzen."); return; }
  if(confirm("Wirklich alle Zähler auf 0 zurücksetzen?")){
    Object.keys(counts).forEach(id => { counts[id] = 0; scheduleSave(id); });
    render();
    showStatus("Register zurückgesetzt.");
  }
});
document.getElementById("saveBtn").addEventListener("click", copyProgress);
document.getElementById("loadBtn").addEventListener("click", pasteProgress);
document.getElementById("lockBtn").addEventListener("click", () => {
  if(editUnlocked) return;
  tryUnlock();
});

(async function init(){
  if(sessionStorage.getItem("hq-edit-unlocked") === "1"){
    editUnlocked = true;
  }
  updateLockUI();
  await loadCounts();
  render();
  startPolling();
})();
</script>

</body>
</html>
