<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dungeon Druck-Register</title>
<style>
  @import url('https://fonts.cdnfonts.com/css/cinzel-decorative');
  @import url('https://fonts.cdnfonts.com/css/im-fell-english');

  :root{
    --abyss: #100d09;
    --stone: #1c1710;
    --stone-2: #262017;
    --stone-3: #322a1e;
    --parchment: #ecdcb4;
    --parchment-dim: #a89372;
    --ember: #c85a2b;
    --ember-glow: #e8823f;
    --gold: #d0a850;
    --gold-dim: #8a6f38;
    --moss: #6d8a5e;
    --moss-bright: #8fb27c;
    --line: rgba(208,168,80,0.22);
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{ margin:0; padding:0; }

  body{
    background:
      radial-gradient(ellipse 120% 50% at 50% 0%, rgba(232,130,63,0.10) 0%, transparent 55%),
      radial-gradient(ellipse 100% 40% at 50% 100%, rgba(208,168,80,0.05) 0%, transparent 60%),
      var(--abyss);
    color: var(--parchment);
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ---------- Header: torch-lit gate ---------- */
  header{
    position: relative;
    text-align: center;
    padding: 34px 18px 26px;
    overflow: hidden;
  }
  header::before{
    content:"";
    position:absolute; inset:0;
    background:
      repeating-linear-gradient(90deg,
        transparent 0 54px, rgba(0,0,0,0.35) 54px 56px),
      repeating-linear-gradient(0deg,
        transparent 0 30px, rgba(0,0,0,0.35) 30px 32px),
      linear-gradient(180deg, var(--stone-2), var(--stone));
    opacity: 0.9;
    z-index: 0;
  }
  header::after{
    content:"";
    position:absolute; left:0; right:0; bottom:0; height:2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    z-index: 1;
  }
  .torches{
    position:absolute; top:20px; left:0; right:0;
    display:flex; justify-content:space-between;
    padding: 0 16px;
    z-index: 1;
    pointer-events:none;
  }
  .torch{
    font-size: 1.3rem;
    filter: drop-shadow(0 0 8px rgba(232,130,63,0.8));
    animation: flicker 2.8s infinite ease-in-out;
  }
  .torch:last-child{ animation-delay: -1.4s; }
  @keyframes flicker{
    0%,100%{ opacity:1; transform: scale(1); }
    45%{ opacity:0.75; transform: scale(0.96); }
    60%{ opacity:0.95; transform: scale(1.02); }
  }
  @media (prefers-reduced-motion: reduce){
    .torch{ animation: none; }
  }

  h1{
    position: relative; z-index: 1;
    font-family: 'Cinzel Decorative', Georgia, serif;
    font-size: 1.45rem;
    letter-spacing: 0.10em;
    margin: 4px 0 4px;
    color: var(--gold);
    text-shadow: 0 0 18px rgba(232,130,63,0.35), 0 2px 4px rgba(0,0,0,0.8);
  }
  header p{
    position: relative; z-index: 1;
    margin: 0;
    color: var(--parchment-dim);
    font-family: 'IM Fell English', Georgia, serif;
    font-style: italic;
    font-size: 0.9rem;
  }

  /* ---------- Overall quest progress ---------- */
  .quest{
    max-width: 620px;
    margin: 20px auto 0;
    padding: 0 18px;
  }
  .quest-frame{
    border: 1px solid var(--line);
    border-radius: 6px;
    background: linear-gradient(180deg, var(--stone-2), var(--stone));
    padding: 14px 16px 12px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 6px 16px rgba(0,0,0,0.45);
  }
  .quest-head{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom: 8px;
  }
  .quest-label{
    font-family: 'IM Fell English', Georgia, serif;
    font-style: italic;
    color: var(--parchment-dim);
    font-size: 0.85rem;
  }
  .quest-pct{
    font-family: 'Cinzel Decorative', Georgia, serif;
    color: var(--gold);
    font-size: 1.15rem;
  }
  .quest-track{
    position: relative;
    height: 14px;
    border-radius: 8px;
    background: var(--abyss);
    border: 1px solid rgba(0,0,0,0.6);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.7);
    overflow: hidden;
  }
  .quest-fill{
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #7a3a1c, var(--ember), var(--ember-glow));
    box-shadow: 0 0 12px rgba(232,130,63,0.5);
    transition: width 0.5s ease;
    border-radius: 8px;
  }
  .quest-count{
    text-align: right;
    font-size: 0.75rem;
    color: var(--parchment-dim);
    margin-top: 6px;
    letter-spacing: 0.04em;
  }

  /* ---------- Save state chip ---------- */
  .save-chip{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    letter-spacing: 0.03em;
    color: var(--parchment-dim);
    margin-top: 8px;
  }
  .save-dot{
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gold-dim);
  }
  .save-chip.ok .save-dot{ background: var(--moss-bright); box-shadow: 0 0 6px rgba(143,178,124,0.7); }
  .save-chip.ok{ color: var(--moss-bright); }
  .save-chip.fail .save-dot{ background: var(--ember-glow); box-shadow: 0 0 6px rgba(232,130,63,0.7); }
  .save-chip.fail{ color: var(--ember-glow); }

  /* ---------- Sections ---------- */
  main{
    max-width: 620px;
    margin: 26px auto 0;
    padding: 0 14px;
  }
  .section{
    margin-bottom: 30px;
  }
  .section-head{
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    margin: 0 4px 12px;
  }
  .section-title{
    font-family: 'Cinzel Decorative', Georgia, serif;
    font-size: 1.0rem;
    color: var(--ember-glow);
    letter-spacing: 0.09em;
    text-transform: uppercase;
  }
  .section-sum{
    font-size: 0.78rem;
    color: var(--parchment-dim);
    white-space: nowrap;
  }
  .section-sum.done{ color: var(--moss-bright); }

  /* ---------- Item cards ---------- */
  .item{
    position: relative;
    background: linear-gradient(180deg, var(--stone-2), var(--stone));
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 13px 14px 13px 18px;
    margin-bottom: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.35);
    transition: border-color 0.3s ease;
  }
  .item::before{
    content:"";
    position:absolute; left:0; top:0; bottom:0; width:4px;
    border-radius: 6px 0 0 6px;
    background: var(--gold-dim);
    opacity: 0.5;
    transition: background 0.3s ease, opacity 0.3s ease;
  }
  .item.done{ border-color: rgba(109,138,94,0.55); }
  .item.done::before{ background: var(--moss-bright); opacity: 1; }

  .item-row{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .item-info{ flex: 1; min-width: 0; }
  .item-name{
    font-size: 0.97rem;
    color: var(--parchment);
    line-height: 1.3;
  }
  .item.done .item-name{ color: var(--moss-bright); }
  .item-count{
    font-size: 0.78rem;
    color: var(--parchment-dim);
    margin-top: 3px;
  }
  .item-count b{ color: var(--parchment); font-weight: normal; }
  .item.done .item-count b{ color: var(--moss-bright); }
  .item-count .done-mark{ color: var(--moss-bright); margin-left: 5px; }

  .item-bar{
    height: 4px;
    border-radius: 3px;
    background: rgba(0,0,0,0.5);
    margin-top: 9px;
    overflow: hidden;
  }
  .item-bar-fill{
    height: 100%;
    width: 0%;
    background: var(--gold-dim);
    transition: width 0.3s ease, background 0.3s ease;
    border-radius: 3px;
  }
  .item.done .item-bar-fill{ background: var(--moss-bright); }

  /* ---------- Stepper ---------- */
  .stepper{
    display: flex;
    align-items: stretch;
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    background: rgba(0,0,0,0.35);
    flex-shrink: 0;
  }
  .stepper button{
    width: 44px;
    height: 44px;
    border: none;
    background: transparent;
    color: var(--gold);
    font-size: 1.35rem;
    font-family: Georgia, serif;
    cursor: pointer;
    line-height: 1;
  }
  .stepper button:active{ background: rgba(208,168,80,0.22); }
  .stepper input{
    width: 44px;
    border: none;
    border-left: 1px solid var(--line);
    border-right: 1px solid var(--line);
    background: transparent;
    color: var(--parchment);
    text-align: center;
    font-size: 1.02rem;
    font-family: Georgia, serif;
  }
  .stepper input:focus{ outline: none; background: rgba(208,168,80,0.12); }
  /* hide number spinners */
  .stepper input::-webkit-outer-spin-button,
  .stepper input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  .stepper input[type=number]{ -moz-appearance: textfield; }

  .item-note{
    font-family: 'IM Fell English', Georgia, serif;
    font-style: italic;
    font-size: 0.78rem;
    color: var(--parchment-dim);
    margin-top: 8px;
  }

  /* ---------- Footer actions ---------- */
  .actions{
    max-width: 620px;
    margin: 6px auto 0;
    padding: 0 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }
  .btn{
    font-family: Georgia, serif;
    font-size: 0.82rem;
    letter-spacing: 0.05em;
    padding: 11px 18px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: linear-gradient(180deg, var(--stone-3), var(--stone-2));
    color: var(--parchment);
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .btn:active{ transform: translateY(1px); }
  .btn.moss{ border-color: rgba(109,138,94,0.6); color: var(--moss-bright); }
  .btn.ember{ border-color: rgba(200,90,43,0.6); color: var(--ember-glow); }

  .status-note{
    text-align: center;
    font-family: 'IM Fell English', Georgia, serif;
    font-style: italic;
    font-size: 0.8rem;
    color: var(--parchment-dim);
    margin-top: 14px;
    padding: 0 20px;
    min-height: 18px;
  }
</style>
</head>
<body>

<header>
  <div class="torches"><span class="torch">🔥</span><span class="torch">🔥</span></div>
  <h1>Dungeon Druck-Register</h1>
  <p>Chronik deines HeroQuest-Boards</p>
</header>

<div class="quest">
  <div class="quest-frame">
    <div class="quest-head">
      <span class="quest-label">Die Quest schreitet voran…</span>
      <span class="quest-pct" id="overallPct">0%</span>
    </div>
    <div class="quest-track"><div class="quest-fill" id="overallFill"></div></div>
    <div class="quest-count" id="overallCount">0 / 0 Teile gedruckt</div>
    <div class="save-chip" id="saveChip"><span class="save-dot"></span><span id="saveChipText">Speicher wird geprüft…</span></div>
  </div>
</div>

<main id="main"></main>

<div class="actions">
  <button class="btn moss" id="saveBtn">Fortschritt sichern</button>
  <button class="btn" id="loadBtn">Fortschritt laden</button>
  <button class="btn ember" id="resetBtn">Zurücksetzen</button>
</div>
<div class="status-note" id="statusNote"></div>

<script>
const DATA = [
  {
    section: "Korridore",
    items: [
      { id: "corr_angolo",   name: "Korridor Eckstück",        target: 4 },
      { id: "corr_5x1_muro", name: "Korridor 5×1 (mit Wand)",  target: 10 },
      { id: "corr_3x1_muro", name: "Korridor 3×1 (mit Wand)",  target: 2 },
      { id: "corr_1x1_muro", name: "Korridor 1×1 (mit Wand)",  target: 2 },
      { id: "corr_3x1",      name: "Korridor 3×1",             target: 8 },
      { id: "corr_4x1",      name: "Korridor 4×1",             target: 2 },
      { id: "corr_5x1",      name: "Korridor 5×1",             target: 6 },
    ]
  },
  {
    section: "Räume",
    items: [
      { id: "room_2x3",     name: "Raum 2×3",             target: 2 },
      { id: "room_3x4",     name: "Raum 3×4",             target: 3 },
      { id: "room_4x4",     name: "Raum 4×4",             target: 8 },
      { id: "room_3x5",     name: "Raum 3×5",             target: 3 },
      { id: "room_4x5",     name: "Raum 4×5",             target: 4 },
      { id: "room_6x5",     name: "Raum 6×5 (Zentral)",   target: 1 },
      { id: "room_special", name: "Spezialraum",          target: 1 },
    ]
  },
  {
    section: "Wände & Türen",
    items: [
      { id: "wall_generic", name: "Wände (gemischt)", target: 20, note: "Richtwert laut Anleitung — je nach Mission ggf. mehr nötig" },
      { id: "door",         name: "Türen",            target: 6,  note: "Anzahl nach eigenem Bedarf anpassbar" },
    ]
  }
];

const STORAGE_KEY = "heroquest-tracker-counts";
let counts = {};
let storageWorks = null;   // null = unknown, true/false after probe
let saveTimer = null;

function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }

/* ---------- Save-state chip ---------- */
function setChip(state, text){
  const chip = document.getElementById("saveChip");
  chip.className = "save-chip" + (state ? " " + state : "");
  document.getElementById("saveChipText").textContent = text;
}

/* ---------- Storage: browser localStorage (works on any website) ---------- */
async function probeStorage(){
  try{
    const probeKey = STORAGE_KEY + "-probe";
    localStorage.setItem(probeKey, "ok");
    storageWorks = localStorage.getItem(probeKey) === "ok";
    localStorage.removeItem(probeKey);
  }catch(e){
    storageWorks = false;
  }
  if(storageWorks){
    setChip("ok", "Automatisch gespeichert (auf diesem Gerät)");
  }else{
    setChip("fail", "Speicher blockiert (Privatmodus?) — nutze „Fortschritt sichern“");
  }
}

async function loadCounts(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      counts = JSON.parse(raw);
    }
  }catch(e){
    counts = {};
  }
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 350);
}

async function doSave(){
  if(storageWorks === false) return;
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(counts));
    setChip("ok", "Automatisch gespeichert (auf diesem Gerät)");
  }catch(e){
    storageWorks = false;
    setChip("fail", "Speichern blockiert — nutze „Fortschritt sichern“");
  }
}

/* Flush pending save when the page is hidden/closed */
document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "hidden"){
    clearTimeout(saveTimer);
    doSave();
  }
});

/* ---------- Manual backup: compact code via clipboard ---------- */
function encodeProgress(){
  const entries = Object.keys(counts)
    .filter(k => counts[k] > 0)
    .map(k => `${k}:${counts[k]}`);
  return "HQ1|" + entries.join("|");
}

function decodeProgress(text){
  const trimmed = text.trim();
  if(!trimmed.startsWith("HQ1")) throw new Error("invalid");
  const parts = trimmed.split("|").slice(1).filter(Boolean);
  const parsed = {};
  parts.forEach(p => {
    const idx = p.lastIndexOf(":");
    if(idx === -1) return;
    const val = parseInt(p.slice(idx + 1), 10);
    if(!isNaN(val)) parsed[p.slice(0, idx)] = val;
  });
  return parsed;
}

async function copyProgress(){
  const code = encodeProgress();
  try{
    await navigator.clipboard.writeText(code);
    showStatus("Fortschritt kopiert — füge ihn z. B. in deine Notizen ein.");
  }catch(e){
    window.prompt("Kopieren nicht möglich — Text manuell markieren:", code);
  }
}

async function pasteProgress(){
  let text = "";
  try{ text = await navigator.clipboard.readText(); }
  catch(e){ text = window.prompt("Gespeicherten Fortschritts-Code einfügen:") || ""; }
  if(!text) return;
  try{
    counts = decodeProgress(text);
    scheduleSave();
    render();
    showStatus("Fortschritt geladen.");
  }catch(e){
    showStatus("Code nicht lesbar — bitte prüfen und erneut versuchen.");
  }
}

function showStatus(msg){
  const el = document.getElementById("statusNote");
  el.textContent = msg;
  setTimeout(() => { if(el.textContent === msg) el.textContent = ""; }, 3500);
}

/* ---------- Rendering ---------- */
function render(){
  const main = document.getElementById("main");
  main.innerHTML = "";

  let grandCurrent = 0, grandTarget = 0;

  DATA.forEach(section => {
    let secCurrent = 0, secTarget = 0;
    section.items.forEach(it => {
      secCurrent += Math.min(clamp(counts[it.id] ?? 0, 0, 9999), it.target);
      secTarget += it.target;
    });

    const sec = document.createElement("div");
    sec.className = "section";

    const head = document.createElement("div");
    head.className = "section-head";
    const secDone = secCurrent >= secTarget;
    head.innerHTML = `
      <span class="section-title">${section.section}</span>
      <span class="section-sum${secDone ? " done" : ""}">${secDone ? "✓ vollständig" : secCurrent + " / " + secTarget}</span>
    `;
    sec.appendChild(head);

    section.items.forEach(item => {
      const current = clamp(counts[item.id] ?? 0, 0, 9999);
      grandCurrent += Math.min(current, item.target);
      grandTarget += item.target;

      const pct = clamp((current / item.target) * 100, 0, 100);
      const isDone = current >= item.target;

      const el = document.createElement("div");
      el.className = "item" + (isDone ? " done" : "");
      el.innerHTML = `
        <div class="item-row">
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-count"><b>${current}</b> von ${item.target}${isDone ? '<span class="done-mark">✓</span>' : ""}</div>
          </div>
          <div class="stepper">
            <button data-action="dec" data-id="${item.id}" aria-label="Eins weniger">−</button>
            <input type="number" min="0" value="${current}" data-id="${item.id}" inputmode="numeric" aria-label="Anzahl ${item.name}">
            <button data-action="inc" data-id="${item.id}" aria-label="Eins mehr">+</button>
          </div>
        </div>
        <div class="item-bar"><div class="item-bar-fill" style="width:${pct}%"></div></div>
        ${item.note ? `<div class="item-note">${item.note}</div>` : ""}
      `;
      sec.appendChild(el);
    });

    main.appendChild(sec);
  });

  const overallPct = grandTarget > 0 ? clamp((grandCurrent / grandTarget) * 100, 0, 100) : 0;
  document.getElementById("overallFill").style.width = overallPct + "%";
  document.getElementById("overallCount").textContent = `${grandCurrent} / ${grandTarget} Teile gedruckt`;
  document.getElementById("overallPct").textContent = Math.round(overallPct) + "%";

  attachHandlers();
}

function attachHandlers(){
  document.querySelectorAll(".stepper button").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-id");
      const cur = clamp(counts[id] ?? 0, 0, 9999);
      counts[id] = btn.getAttribute("data-action") === "inc" ? cur + 1 : clamp(cur - 1, 0, 9999);
      scheduleSave();
      render();
    });
  });
  document.querySelectorAll(".stepper input").forEach(input => {
    input.addEventListener("change", () => {
      const id = input.getAttribute("data-id");
      let val = parseInt(input.value, 10);
      if(isNaN(val) || val < 0) val = 0;
      counts[id] = val;
      scheduleSave();
      render();
    });
  });
}

document.getElementById("resetBtn").addEventListener("click", () => {
  if(confirm("Wirklich alle Zähler auf 0 zurücksetzen?")){
    counts = {};
    scheduleSave();
    render();
    showStatus("Register zurückgesetzt.");
  }
});
document.getElementById("saveBtn").addEventListener("click", copyProgress);
document.getElementById("loadBtn").addEventListener("click", pasteProgress);

(async function init(){
  await loadCounts();
  render();
  await probeStorage();
})();
</script>

</body>
</html>
